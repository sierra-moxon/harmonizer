# docker-compose.yml — run the harmonizer web app (Phase 9).
#
#   docker compose build   # build the web image (see `just docker-build` for the
#                          # full base/executor/agent hierarchy)
#   docker compose up      # serve the UI at http://localhost:8080
#
# The `web` service owns the JobManager. With HARMONIZER_USE_CONTAINER_ISOLATION=1
# each job runs in a SIBLING container (image `harmonizer-agent:latest`) launched
# by JobContainerRunner through the mounted Docker socket (docker-out-of-docker).
# The agent image must be built separately first (`just docker-build`), since
# compose only builds `web` here.

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: harmonizer-web:latest
    ports:
      - "8080:8080"
    environment:
      # Provider credential for real agent runs (pass through from the host).
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # Toggle per-job container isolation. Off by default (in-process loop);
      # set to 1 to launch sibling job containers via the socket below.
      HARMONIZER_USE_CONTAINER_ISOLATION: ${HARMONIZER_USE_CONTAINER_ISOLATION:-0}
      # Jobs + the DB live on the shared ./data volume so the container-loop
      # writes and the web-host reads see the SAME files. Absolute paths: the
      # SQLite default is relative to CWD, which diverges across containers.
      HARMONIZER_JOBS_ROOT: /data/jobs
      HARMONIZER_DATABASE_URL: sqlite:////data/harmonizer.db
      # Image the per-job containers run (must match the tag built by
      # `just docker-build`).
      HARMONIZER_JOB_IMAGE: harmonizer-agent:latest
    volumes:
      # Job directories + SQLite DB, shared with any sibling job containers.
      - ./data:/data
      # Legacy/local jobs dir mount kept for parity with local `just web` runs.
      - ./jobs:/data/jobs
      # docker-out-of-docker: lets the JobManager launch sibling per-job
      # containers on the host daemon. Mounting the socket grants host-level
      # Docker control — only do this in a trusted single-user deployment.
      - /var/run/docker.sock:/var/run/docker.sock

    # !! SQLite-across-containers caveat (plan open risk #5) !!
    # ---------------------------------------------------------------------
    # The default store is a single SQLite file on the ./data bind mount. The
    # host web process (pages: list_jobs/get_job) and each sibling job container
    # (the loop + MCP ledger tools) then read/write the SAME file concurrently.
    # SQLite file locking over a bind mount is FRAGILE (WAL/lock caveats across
    # the mount boundary), so this is only safe for light, low-concurrency,
    # single-user local use. For concurrent jobs, escalate to Postgres: uncomment
    # the `db` service below and point HARMONIZER_DATABASE_URL at it. All
    # persistence already routes through get_database_url()/session_factory, so
    # ONLY the URL changes — no code edits.
    # depends_on:
    #   - db

  # --- OPTIONAL Postgres (commented; SQLite is the default) ------------------
  # Uncomment this service AND set, on `web`:
  #   HARMONIZER_DATABASE_URL: postgresql+psycopg://harmonizer:harmonizer@db:5432/harmonizer
  # (and add `psycopg` to the project deps). Prefer this when multiple job
  # containers may run concurrently — it sidesteps the SQLite bind-mount locking
  # fragility noted above.
  # db:
  #   image: postgres:16
  #   environment:
  #     POSTGRES_USER: harmonizer
  #     POSTGRES_PASSWORD: harmonizer
  #     POSTGRES_DB: harmonizer
  #   volumes:
  #     - pgdata:/var/lib/postgresql/data


# docker-compose.yml — run the harmonizer web app with Postgres (Phase 9).
#
#   docker compose build                       # build the web image
#   docker compose --profile build-only build  # also build the agent image
#   docker compose up                          # serve the UI at http://localhost:8080
#
# Follows the OpenScientist deployment convention: Postgres is a first-class
# service (not a SQLite file), the `web` service waits for it to be healthy, and
# per-job containers run in SIBLING containers on the same compose network so
# they can reach `postgres` by hostname.
#
# The `web` service owns the JobManager. With HARMONIZER_USE_CONTAINER_ISOLATION=1
# (the default here) each job runs in a sibling container (image
# `harmonizer-agent:latest`) launched by JobContainerRunner through the mounted
# Docker socket (docker-out-of-docker). Build that image first with the
# `build-only` profile (or `just docker-build`); `docker compose up` does not
# build it.

services:
  postgres:
    image: postgres:18
    restart: ${HARMONIZER_RESTART_POLICY:-unless-stopped}
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-harmonizer}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-harmonizer_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-harmonizer}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-harmonizer} -d ${POSTGRES_DB:-harmonizer}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: harmonizer-web:latest
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${PORT:-8080}:8080"
    environment:
      # Provider credential for real agent runs (pass through from the host).
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # Per-job container isolation. On by default (sibling job containers via
      # the socket below); set to 0 to run the loop in-process instead.
      HARMONIZER_USE_CONTAINER_ISOLATION: ${HARMONIZER_USE_CONTAINER_ISOLATION:-1}
      # Job dirs live under the app tree, bind-mounted from ./jobs (below).
      HARMONIZER_JOBS_ROOT: /app/jobs
      # Networked store shared by the web process and every sibling job
      # container. Uses psycopg (sync driver) to match the app's sync engine.
      HARMONIZER_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-harmonizer}:${POSTGRES_PASSWORD:-harmonizer_dev_password}@postgres:5432/${POSTGRES_DB:-harmonizer}
      # Image the per-job containers run (must match the tag built by
      # `just docker-build` / the build-only profile).
      HARMONIZER_JOB_IMAGE: ${HARMONIZER_JOB_IMAGE:-harmonizer-agent:latest}
      # Host path of this project dir on the DOCKER HOST. Sibling job containers
      # are launched on the host daemon, so their bind-mount sources must be
      # host paths; the runner translates /app/... → ${PWD}/... using this.
      HARMONIZER_HOST_PROJECT_DIR: ${HARMONIZER_HOST_PROJECT_DIR:-${PWD}}
      HARMONIZER_CONTAINER_APP_DIR: /app
    volumes:
      # Job directories, shared with the sibling job containers (host ./jobs ↔
      # container /app/jobs; the runner maps back to the host path for siblings).
      - ./jobs:/app/jobs
      # docker-out-of-docker: lets the JobManager launch sibling per-job
      # containers on the host daemon. Mounting the socket grants host-level
      # Docker control — only do this in a trusted single-user deployment.
      - /var/run/docker.sock:/var/run/docker.sock
    # The web container needs permission to talk to the Docker socket; set
    # DOCKER_GID to the host docker group's gid (e.g. `stat -c '%g' /var/run/docker.sock`).
    group_add:
      - "${DOCKER_GID:-999}"

  # harmonizer-agent: build-only image spawned at runtime by JobContainerRunner.
  # Excluded from `docker compose up`; build it with:
  #   docker compose --profile build-only build harmonizer-agent
  # (it builds on Dockerfile.executor, so runoak + prefetched ontologies ship).
  harmonizer-agent:
    build:
      context: .
      dockerfile: Dockerfile.agent
    image: harmonizer-agent:latest
    profiles: ["build-only"]
    entrypoint: ["echo", "harmonizer-agent image built"]

volumes:
  postgres_data:
